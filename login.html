<style>
body{
    background:radial-gradient(circle at top,#020617,#020617 40%,#000);
    color:#e2e8f0;
    font-family:'Segoe UI',sans-serif;
}

.login-container{
    width:100%;
    max-width:420px;
}



.card{
    background:#0b1224;
    border:1px solid #1e293b;
    border-radius:14px;
}

.card-body{
    padding:28px;
}

.card-title{
    font-weight:600;
    letter-spacing:.5px;
}

.form-control{
    background:#020617;
    border:1px solid #1e293b;
    color:#e2e8f0;
}

.form-control:focus{
    background:#020617;
    border-color:#38bdf8;
    box-shadow:none;
    color:#fff;
}



pre{
    background:#020617;
    border:1px solid #1e293b;
    color:#22c55e;
    padding:12px;
    height:160px;
    overflow:auto;
    border-radius:10px;
    font-size:12px;
}
</style>

<div class="container login-container">
    <div class="card shadow-lg">
        <div class="card-body">
            <h4 class="card-title text-center mb-4">MU API Login</h4>

            <div id="sessionInfo" class="mb-2 text-info small"></div>

            <input id="user" class="form-control mb-2" placeholder="Username" autocomplete="username">
            <input id="pass" type="password" class="form-control mb-3" placeholder="Password" autocomplete="current-password">

            <button type="button" class="btn btn-primary btn-block mb-2" id="btnLogin">Login</button>
            <button type="button" class="btn btn-danger btn-block mb-2" id="btnLogout">Logout</button>
            <button type="button" class="btn btn-success btn-block mb-3" id="btnTest">Test</button>

            <pre id="log"></pre>
        </div>
    </div>
</div>
