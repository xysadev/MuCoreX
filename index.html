<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Addon SPA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="p-2" style="text-transform: uppercase;">
        <a href="" class="btn btn-primary" data-spa="true" style="font-weight: bold;">Inicio</a>
        <a href="#login" class="btn btn-primary" data-spa="true" style="font-weight: bold;">Login</a>
    </nav>

    <div id="app" class="p-4">
        <h1>Inicio</h1>
        <p>Bienvenido a tu addon.</p>
    </div>

    <script>
        async function router() {
            const app = document.getElementById('app');
            if (!app) return;

            const hash = window.location.hash.replace('#', ''); // login, dashboard, settings

            switch(hash) {
                case 'login':
                    try {
                        const res = await fetch('login.html');
                        const html = await res.text();
                        app.innerHTML = html;

                        // Eliminar script viejo si existe
                        const oldScript = document.querySelector('script[src="assets/js/main.js"]');
                        if(oldScript) oldScript.remove();

                        // Agregar main.js para login
                        const script = document.createElement('script');
                        script.src = 'assets/js/main.js';
                        document.body.appendChild(script);

                        script.onload = () => {
                            if(typeof validateSession === 'function') validateSession();
                        };
                    } catch(err) {
                        app.innerHTML = '<p class="text-danger">Error cargando login.html</p>';
                    }
                    break;

                case 'dashboard':
                    app.innerHTML = `
                        <h1>Dashboard</h1>
                        <p>Bienvenido al panel.</p>
                    `;
                    break;

                case 'settings':
                    app.innerHTML = `
                        <h1>Configuración</h1>
                        <p>Ajustes del addon.</p>
                    `;
                    break;

                default:
                    app.innerHTML = `
                        <h1>Inicio</h1>
                        <p>Bienvenido a tu addon.</p>
                    `;
            }
        }

        window.addEventListener('hashchange', router);
        window.addEventListener('DOMContentLoaded', router);

        // SPA links
        document.body.addEventListener('click', e => {
            if(e.target.tagName === 'A' && e.target.dataset.spa === 'true') {
                e.preventDefault();
                const href = e.target.getAttribute('href');
                window.location.hash = href.startsWith('#') ? href : '#' + href;
            }
        });
    </script>
</body>
</html>
