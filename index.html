<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Addon SPA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="p-2">
        <a href="login.html" class="btn btn-primary" data-spa="true">Ir a Login</a>
        <a href="dashboard" class="btn btn-secondary" data-spa="true">Dashboard</a>
        <a href="settings" class="btn btn-secondary" data-spa="true">Configuración</a>
    </nav>

    <div id="app" class="p-4">
        <h1>Inicio</h1>
        <p>Bienvenido a tu addon.</p>
    </div>

    <script>
        async function router() {
            const path = window.location.pathname.replace(/^.*\/MuCoreX\/?/, '');
            const app = document.getElementById('app');
            if(!app) return;

            switch(path) {
                case 'login.html':
                case 'login':
                    // Cargar login.html real
                    try {
                        const res = await fetch('login.html');
                        const html = await res.text();
                        app.innerHTML = html;

                        // Eliminar script viejo si existe
                        const oldScript = document.querySelector('script[src="assets/js/main.js"]');
                        if(oldScript) oldScript.remove();

                        // Agregar main.js para login
                        const script = document.createElement('script');
                        script.src = 'assets/js/main.js';
                        document.body.appendChild(script);

                        // Esperar que cargue main.js y luego validar sesión
                        script.onload = () => {
                            if(typeof validateSession === 'function') validateSession();
                        };
                    } catch(err) {
                        app.innerHTML = '<p class="text-danger">Error cargando login.html</p>';
                    }
                    break;

                case 'dashboard':
                    app.innerHTML = '<h1>Dashboard</h1><p>Bienvenido al panel.</p>';
                    break;

                case 'settings':
                    app.innerHTML = '<h1>Configuración</h1><p>Ajustes del addon.</p>';
                    break;

                default:
                    app.innerHTML = '<h1>Inicio</h1><p>Bienvenido a tu addon.</p>';
            }
        }

        window.addEventListener('popstate', router);
        window.addEventListener('DOMContentLoaded', () => {
            router();

            document.body.addEventListener('click', e => {
                if(e.target.tagName === 'A' && e.target.dataset.spa === 'true') {
                    e.preventDefault();
                    history.pushState({}, '', e.target.getAttribute('href'));
                    router();
                }
            });
        });
    </script>
</body>
</html>
